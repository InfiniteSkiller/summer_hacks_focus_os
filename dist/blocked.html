<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked - Focus OS</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #e6edf3;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(92vw, 560px);
        padding: 28px;
        border-radius: 14px;
        border: 1px solid #30363d;
        background: #161b22;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #9da7b3;
      }

      .url {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #0b1220;
        border: 1px solid #1f2937;
        color: #7dd3fc;
        word-break: break-all;
      }

      button {
        margin-top: 18px;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
        background: #238636;
        color: #ffffff;
      }

      button:hover {
        background: #2ea043;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You chose to focus</h1>
      <p>This site is blocked during your focus session:</p>
      <div class="url" id="blocked-url">Unknown URL</div>
      <button type="button" id="break-btn">Take a break instead</button>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const blockedUrl = params.get("url") || "Unknown URL";
      const blockedUrlEl = document.getElementById("blocked-url");
      const breakBtn = document.getElementById("break-btn");

      blockedUrlEl.textContent = blockedUrl;

      breakBtn.addEventListener("click", () => {
        if (typeof chrome !== "undefined" && chrome.runtime?.sendMessage) {
          chrome.runtime.sendMessage({ type: "BREAK_START" }, () => {
            void chrome.runtime.lastError;
          });
        }

        window.location.href = "http://localhost:5173";
      });
    </script>
  </body>
</html>
